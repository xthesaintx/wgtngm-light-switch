name: Release Creation

on:
  release:
    types: [published]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Substitute Manifest Details
        uses: im-open/variable-substitution@v2
        with:
          files: "module.json"
        env:
          version: ${{ github.event.release.tag_name }}
          url: https://github.com/${{ github.repository }}
          manifest: https://github.com/${{ github.repository }}/releases/latest/download/module.json
          download: https://github.com/${{ github.repository }}/releases/download/${{ github.event.release.tag_name }}/module.zip

      - name: Create Zip Archive
        run: zip -r ./module.zip module.json readme.md changelog.md scripts/ lang/

      - name: Update Release with Files
        uses: ncipollo/release-action@v1
        with:
          allowUpdates: true
          token: ${{ secrets.GITHUB_TOKEN }}
          artifacts: "./module.json, ./module.zip"
          tag: ${{ github.event.release.tag_name }}

      # Add a small delay to ensure files are available on GitHub
      - name: Wait for Release Files to be Available
        run: |
          max_attempts=12
          attempt=0
          while [ $attempt -lt $max_attempts ]; do
            if curl -f -s https://github.com/${{ github.repository }}/releases/download/${{ github.event.release.tag_name }}/module.json > /dev/null; then
              echo "Manifest file is available"
              exit 0
            fi
            attempt=$((attempt + 1))
            echo "Attempt $attempt/$max_attempts: Manifest not yet available, waiting..."
            sleep 5
          done
          echo "Manifest file failed to become available"
          exit 1

      - name: Publish to FoundryVTT Website
        uses: cs96and/FoundryVTT-release-package@v1
        with:
          package-token: ${{ secrets.PACKAGE_TOKEN }}
          manifest-url: https://github.com/${{ github.repository }}/releases/download/${{ github.event.release.tag_name }}/module.json
          notes-url: "https://github.com/${{ github.repository }}/blob/main/ChangeLog.md"
