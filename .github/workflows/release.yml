name: Release Creation

on:
  release:
    types: [published]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Update module.json for this release
        run: |
          VERSION="${{ github.event.release.tag_name }}"
          REPO_URL="https://github.com/${{ github.repository }}"

          jq \
            --arg version "$VERSION" \
            --arg url "$REPO_URL" \
            --arg manifest "$REPO_URL/releases/latest/download/module.json" \
            --arg download "$REPO_URL/releases/download/$VERSION/module.zip" \
            '.version = $version | .url = $url | .manifest = $manifest | .download = $download' \
            module.json > module.json.tmp

          mv module.json.tmp module.json

      - name: Create Zip Archive
        run: |
          files=(module.json README.md scripts styles templates lang)
          [ -f ChangeLog.md ] && files+=(ChangeLog.md)
          [ -d ui ] && files+=(ui)
          [ -d packs ] && files+=(packs)
          zip -r module.zip "${files[@]}"

      - name: Update Release with Files
        uses: ncipollo/release-action@v1
        with:
          allowUpdates: true
          replacesArtifacts: true
          artifacts: "./module.json,./module.zip"
          tag: ${{ github.event.release.tag_name }}
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish to FoundryVTT Website
        if: ${{ secrets.PACKAGE_TOKEN != '' }}
        uses: cs96and/FoundryVTT-release-package@v1
        with:
          package-token: ${{ secrets.PACKAGE_TOKEN }}
          manifest-url: https://github.com/${{ github.repository }}/releases/download/${{ github.event.release.tag_name }}/module.json
          notes-url: https://github.com/${{ github.repository }}/releases/tag/${{ github.event.release.tag_name }}
